- name: Prepare the stuff
  hosts: localhost
  gather_facts: false

  vars:
    aap_hostname: "{{ aap }}"
    aap_username: "{{ user }}"
    aap_password: "{{ pass }}"
    aap_validate_certs: "{{ cert }}"

  tasks:
    - name: create random string
      set_fact:
        random_suffix: "{{ lookup('ansible.builtin.password', '/dev/null chars=ascii_lowercase,digits length=6') }}"
  
    - name: Define the inventory name
      set_fact:
        target_inv_name: "tmpinventory_{{ random_suffix }}"

    - name: Build the controller_hosts list for the role
      set_fact:
        # We initialize an empty list and append the required dict structure
        my_formatted_hosts: "{{ my_formatted_hosts | default([]) + [{ 'name': item, 'inventory': target_inv_name, 'state': 'present' }] }}"
      loop: "{{ onhosts }}"

    - name: Create the Inventory
      include_role:
        name: infra.aap_configuration.controller_inventories
      vars:
        # The role expects a list called 'controller_inventories'
        controller_inventories:
          - name: "{{ target_inv_name }}"
            organization: "Default"
            state: present

    - name: Add Hosts to the Inventory
      include_role:
        name: infra.aap_configuration.controller_hosts
      vars:
        # Pass the list we just built to the role's expected variable
        controller_hosts: "{{ my_formatted_hosts }}"
